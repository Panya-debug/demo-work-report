<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamWork Report — เข้าสู่ระบบ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/theme.css">
    <style>
        /* ===== RESET & BASE ===== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #0f1629;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.12);
            --text-primary: #f0f0f5;
            --text-secondary: rgba(224, 224, 240, 0.6);
            --text-muted: rgba(224, 224, 240, 0.35);
            --accent-indigo: #6366f1;
            --accent-violet: #8b5cf6;
            --accent-purple: #a78bfa;
            --accent-blue: #818cf8;
            --gradient-primary: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
            --gradient-bg: linear-gradient(135deg, #0a0e1a 0%, #111832 30%, #0d1226 60%, #0a0e1a 100%);
            --glow-indigo: 0 0 30px rgba(99, 102, 241, 0.3);
            --glow-violet: 0 0 30px rgba(139, 92, 246, 0.3);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --radius-xl: 28px;
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            --transition-spring: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Noto Sans Thai', 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ===== ANIMATED BACKGROUND ===== */
        .bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            background: var(--gradient-bg);
        }

        /* Mesh gradient overlay */
        .bg-canvas::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 10% 90%, rgba(99, 102, 241, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 90% 10%, rgba(139, 92, 246, 0.1) 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 50% 50%, rgba(67, 56, 202, 0.06) 0%, transparent 70%);
            animation: meshShift 12s ease-in-out infinite alternate;
        }

        @keyframes meshShift {
            0% { opacity: 0.8; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.05); }
        }

        /* Noise texture overlay */
        .bg-canvas::after {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-size: 256px 256px;
        }

        /* Floating orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            will-change: transform;
            pointer-events: none;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.2) 0%, rgba(99, 102, 241, 0) 70%);
            top: -15%;
            right: -10%;
            animation: float1 18s ease-in-out infinite;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.18) 0%, rgba(139, 92, 246, 0) 70%);
            bottom: -10%;
            left: -8%;
            animation: float2 22s ease-in-out infinite;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(167, 139, 250, 0.12) 0%, rgba(167, 139, 250, 0) 70%);
            top: 40%;
            left: 60%;
            animation: float3 16s ease-in-out infinite;
        }

        .orb-4 {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(129, 140, 248, 0.15) 0%, rgba(129, 140, 248, 0) 70%);
            top: 60%;
            left: 15%;
            animation: float4 20s ease-in-out infinite;
        }

        .orb-5 {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, rgba(99, 102, 241, 0) 70%);
            top: 10%;
            left: 30%;
            animation: float5 24s ease-in-out infinite;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(-40px, 30px) scale(1.05); }
            50% { transform: translate(20px, -20px) scale(0.95); }
            75% { transform: translate(-20px, -40px) scale(1.02); }
        }
        @keyframes float2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(50px, -30px) scale(1.08); }
            50% { transform: translate(-30px, 40px) scale(0.92); }
            75% { transform: translate(40px, 20px) scale(1.04); }
        }
        @keyframes float3 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-60px, 40px) scale(1.1); }
            66% { transform: translate(30px, -50px) scale(0.9); }
        }
        @keyframes float4 {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(40px, -60px) rotate(20deg); }
        }
        @keyframes float5 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            40% { transform: translate(-30px, -40px) scale(1.15); }
            80% { transform: translate(50px, 30px) scale(0.85); }
        }

        /* Floating geometric shapes */
        .shape {
            position: absolute;
            pointer-events: none;
            opacity: 0;
            animation: shapeFloat 20s ease-in-out infinite;
        }

        .shape-ring {
            width: 60px;
            height: 60px;
            border: 1.5px solid rgba(139, 92, 246, 0.12);
            border-radius: 50%;
            top: 20%;
            right: 20%;
            animation-delay: 0s;
            animation-duration: 18s;
        }

        .shape-diamond {
            width: 30px;
            height: 30px;
            border: 1.5px solid rgba(99, 102, 241, 0.1);
            top: 70%;
            right: 30%;
            transform: rotate(45deg);
            animation-delay: -5s;
            animation-duration: 22s;
        }

        .shape-dot {
            width: 6px;
            height: 6px;
            background: rgba(167, 139, 250, 0.2);
            border-radius: 50%;
            top: 30%;
            left: 15%;
            animation-delay: -3s;
            animation-duration: 14s;
        }

        .shape-dot-2 {
            width: 4px;
            height: 4px;
            background: rgba(99, 102, 241, 0.15);
            border-radius: 50%;
            top: 80%;
            left: 70%;
            animation-delay: -8s;
            animation-duration: 16s;
        }

        .shape-cross {
            width: 20px;
            height: 20px;
            top: 15%;
            left: 70%;
            animation-delay: -12s;
            animation-duration: 25s;
        }

        .shape-cross::before,
        .shape-cross::after {
            content: '';
            position: absolute;
            background: rgba(129, 140, 248, 0.12);
            border-radius: 2px;
        }
        .shape-cross::before {
            width: 100%;
            height: 2px;
            top: 50%;
            transform: translateY(-50%);
        }
        .shape-cross::after {
            width: 2px;
            height: 100%;
            left: 50%;
            transform: translateX(-50%);
        }

        .shape-ring-sm {
            width: 24px;
            height: 24px;
            border: 1px solid rgba(167, 139, 250, 0.08);
            border-radius: 50%;
            bottom: 25%;
            left: 25%;
            animation-delay: -7s;
            animation-duration: 20s;
        }

        @keyframes shapeFloat {
            0%, 100% { opacity: 0; transform: translateY(0) rotate(0deg); }
            10% { opacity: 1; }
            50% { opacity: 0.6; transform: translateY(-80px) rotate(180deg); }
            90% { opacity: 1; }
        }

        /* Grid pattern overlay */
        .grid-overlay {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 60% 50% at 50% 50%, black, transparent);
            -webkit-mask-image: radial-gradient(ellipse 60% 50% at 50% 50%, black, transparent);
        }

        /* ===== LOGIN CONTAINER ===== */
        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        /* ===== GLASS CARD ===== */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(1.3);
            -webkit-backdrop-filter: blur(40px) saturate(1.3);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            padding: 48px 40px 40px;
            position: relative;
            overflow: hidden;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.03) inset,
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 80px rgba(99, 102, 241, 0.04);

            /* Stagger animation */
            opacity: 0;
            transform: translateY(30px) scale(0.98);
            animation: cardAppear 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
        }

        @keyframes cardAppear {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Top highlight line */
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 20%;
            right: 20%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(167, 139, 250, 0.3), rgba(99, 102, 241, 0.3), transparent);
        }

        /* Subtle inner glow */
        .glass-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 120px;
            background: linear-gradient(180deg, rgba(99, 102, 241, 0.03) 0%, transparent 100%);
            pointer-events: none;
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
        }

        /* ===== LOGO AREA ===== */
        .logo-area {
            text-align: center;
            margin-bottom: 36px;
            position: relative;
            z-index: 1;

            opacity: 0;
            transform: translateY(20px);
            animation: fadeSlideUp 0.6s var(--transition-smooth) 0.5s forwards;
        }

        .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 72px;
            height: 72px;
            border-radius: var(--radius-lg);
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(139, 92, 246, 0.1));
            border: 1px solid rgba(99, 102, 241, 0.15);
            font-size: 34px;
            margin-bottom: 20px;
            position: relative;
            box-shadow:
                0 8px 32px rgba(99, 102, 241, 0.12),
                0 0 0 1px rgba(255, 255, 255, 0.04) inset;
            transition: transform var(--transition-smooth), box-shadow var(--transition-smooth);
        }

        .logo-icon:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow:
                0 12px 40px rgba(99, 102, 241, 0.2),
                0 0 0 1px rgba(255, 255, 255, 0.06) inset;
        }

        /* Glow ring behind logo */
        .logo-icon::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: calc(var(--radius-lg) + 4px);
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(139, 92, 246, 0.1), transparent);
            z-index: -1;
            opacity: 0;
            transition: opacity var(--transition-smooth);
        }

        .logo-icon:hover::after {
            opacity: 1;
        }

        .app-name {
            font-family: 'Inter', 'Noto Sans Thai', sans-serif;
            font-size: 1.65rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #f0f0f5 30%, var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .app-subtitle {
            font-size: 0.88rem;
            color: var(--text-secondary);
            font-weight: 400;
            letter-spacing: 0.01em;
        }

        /* ===== FORM ===== */
        .login-form {
            position: relative;
            z-index: 1;
        }

        .form-group {
            margin-bottom: 20px;

            opacity: 0;
            transform: translateY(16px);
        }

        .form-group:nth-child(1) { animation: fadeSlideUp 0.5s var(--transition-smooth) 0.65s forwards; }
        .form-group:nth-child(2) { animation: fadeSlideUp 0.5s var(--transition-smooth) 0.75s forwards; }

        @keyframes fadeSlideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-label {
            display: block;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
            letter-spacing: 0.02em;
            transition: color var(--transition-fast);
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.05rem;
            color: var(--text-muted);
            transition: color var(--transition-smooth);
            pointer-events: none;
            z-index: 2;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-family: 'Noto Sans Thai', 'Inter', sans-serif;
            font-size: 0.92rem;
            font-weight: 400;
            outline: none;
            transition:
                background var(--transition-smooth),
                border-color var(--transition-smooth),
                box-shadow var(--transition-smooth);
        }

        .form-input::placeholder {
            color: var(--text-muted);
            font-weight: 300;
        }

        .form-input:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .form-input:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow:
                0 0 0 3px rgba(99, 102, 241, 0.1),
                0 0 20px rgba(99, 102, 241, 0.06);
        }

        .form-input:focus ~ .input-glow {
            opacity: 1;
        }

        .form-group:focus-within .form-label {
            color: var(--accent-purple);
        }

        .form-group:focus-within .input-icon {
            color: var(--accent-blue);
        }

        .input-glow {
            position: absolute;
            inset: -1px;
            border-radius: calc(var(--radius-md) + 1px);
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(139, 92, 246, 0.1), transparent, transparent);
            opacity: 0;
            z-index: -1;
            transition: opacity var(--transition-smooth);
            pointer-events: none;
        }

        /* Password toggle */
        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.05rem;
            padding: 4px;
            transition: color var(--transition-fast);
            z-index: 2;
        }

        .password-toggle:hover {
            color: var(--text-secondary);
        }

        /* ===== FORGOT PASSWORD ===== */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;

            opacity: 0;
            transform: translateY(12px);
            animation: fadeSlideUp 0.5s var(--transition-smooth) 0.85s forwards;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border: 1.5px solid rgba(255, 255, 255, 0.12);
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.03);
            cursor: pointer;
            transition: all var(--transition-fast);
            position: relative;
        }

        .remember-me input[type="checkbox"]:checked {
            background: var(--accent-indigo);
            border-color: var(--accent-indigo);
        }

        .remember-me input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10px;
            color: white;
            font-weight: 700;
        }

        .remember-me span {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .forgot-link {
            font-size: 0.8rem;
            color: var(--accent-purple);
            text-decoration: none;
            font-weight: 500;
            transition: color var(--transition-fast);
        }

        .forgot-link:hover {
            color: var(--accent-blue);
        }

        /* ===== BUTTONS ===== */
        .btn-actions {
            opacity: 0;
            transform: translateY(12px);
            animation: fadeSlideUp 0.5s var(--transition-smooth) 0.95s forwards;
        }

        .btn-login {
            width: 100%;
            padding: 15px 24px;
            background: var(--gradient-primary);
            border: none;
            border-radius: var(--radius-md);
            color: white;
            font-family: 'Noto Sans Thai', 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition:
                transform var(--transition-smooth),
                box-shadow var(--transition-smooth);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.25);
            letter-spacing: 0.02em;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.35);
        }

        .btn-login:active {
            transform: translateY(0) scale(0.98);
            box-shadow: 0 2px 12px rgba(99, 102, 241, 0.2);
        }

        /* Shimmer effect */
        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.12), transparent);
            transition: left 0.6s ease;
        }

        .btn-login:hover::before {
            left: 100%;
        }

        /* Ripple container */
        .btn-login .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0);
            animation: rippleEffect 0.6s ease-out;
            pointer-events: none;
        }

        @keyframes rippleEffect {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* Loading state */
        .btn-login.loading {
            pointer-events: none;
            color: transparent;
        }

        .btn-login.loading::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            gap: 16px;

            opacity: 0;
            animation: fadeSlideUp 0.5s var(--transition-smooth) 1.05s forwards;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--glass-border), transparent);
        }

        .divider span {
            font-size: 0.78rem;
            color: var(--text-muted);
            white-space: nowrap;
            font-weight: 400;
        }

        /* Google button */
        .btn-google {
            width: 100%;
            padding: 13px 24px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-family: 'Noto Sans Thai', 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition:
                background var(--transition-smooth),
                border-color var(--transition-smooth),
                transform var(--transition-smooth),
                box-shadow var(--transition-smooth);

            opacity: 0;
            transform: translateY(12px);
            animation: fadeSlideUp 0.5s var(--transition-smooth) 1.1s forwards;
        }

        .btn-google:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.12);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .btn-google:active {
            transform: translateY(0) scale(0.98);
        }

        .google-icon {
            width: 20px;
            height: 20px;
        }

        /* ===== REGISTER LINK ===== */
        .register-section {
            text-align: center;
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);

            opacity: 0;
            animation: fadeSlideUp 0.5s var(--transition-smooth) 1.2s forwards;
        }

        .register-section p {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .register-link {
            color: var(--accent-purple);
            text-decoration: none;
            font-weight: 600;
            position: relative;
            transition: color var(--transition-fast);
        }

        .register-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1.5px;
            background: var(--gradient-primary);
            border-radius: 1px;
            transition: width var(--transition-smooth);
        }

        .register-link:hover {
            color: var(--accent-blue);
        }

        .register-link:hover::after {
            width: 100%;
        }

        /* ===== FOOTER ===== */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px;
            text-align: center;
            z-index: 10;

            opacity: 0;
            animation: fadeSlideUp 0.5s var(--transition-smooth) 1.4s forwards;
        }

        .footer p {
            font-size: 0.72rem;
            color: var(--text-muted);
            letter-spacing: 0.03em;
        }

        .footer a {
            color: rgba(167, 139, 250, 0.5);
            text-decoration: none;
            transition: color var(--transition-fast);
        }

        .footer a:hover {
            color: var(--accent-purple);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .login-container {
                padding: 16px;
            }

            .glass-card {
                padding: 36px 24px 32px;
                border-radius: var(--radius-lg);
            }

            .logo-icon {
                width: 60px;
                height: 60px;
                font-size: 28px;
            }

            .app-name {
                font-size: 1.4rem;
            }

            .app-subtitle {
                font-size: 0.82rem;
            }

            .form-input {
                padding: 12px 14px 12px 44px;
                font-size: 0.88rem;
            }

            .btn-login,
            .btn-google {
                padding: 13px 20px;
            }

            .orb-1 { width: 300px; height: 300px; }
            .orb-2 { width: 250px; height: 250px; }
            .orb-3 { width: 200px; height: 200px; }
        }

        @media (max-height: 700px) {
            .glass-card {
                padding: 32px 36px 28px;
            }
            .logo-area {
                margin-bottom: 24px;
            }
            .logo-icon {
                width: 56px;
                height: 56px;
                font-size: 26px;
                margin-bottom: 14px;
            }
            .form-group {
                margin-bottom: 14px;
            }
            .divider {
                margin: 18px 0;
            }
            .register-section {
                margin-top: 20px;
                padding-top: 18px;
            }
        }

        /* ===== FOCUS VISIBLE ===== */
        :focus-visible {
            outline: 2px solid var(--accent-indigo);
            outline-offset: 2px;
        }

        .form-input:focus-visible {
            outline: none; /* We use our own focus styles */
        }

        /* ===== SELECTION ===== */
        ::selection {
            background: rgba(99, 102, 241, 0.3);
            color: white;
        }

        /* ===== SUCCESS ANIMATION ===== */
        @keyframes successPulse {
            0% { box-shadow: 0 4px 20px rgba(99, 102, 241, 0.25); }
            50% { box-shadow: 0 4px 30px rgba(34, 197, 94, 0.35); }
            100% { box-shadow: 0 4px 20px rgba(34, 197, 94, 0.15); }
        }

        .btn-login.success {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            animation: successPulse 0.8s ease;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <!-- ===== ANIMATED BACKGROUND ===== -->
    <div class="bg-canvas">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
        <div class="orb orb-5"></div>

        <div class="shape shape-ring"></div>
        <div class="shape shape-diamond"></div>
        <div class="shape shape-dot"></div>
        <div class="shape shape-dot-2"></div>
        <div class="shape shape-cross"></div>
        <div class="shape shape-ring-sm"></div>

        <div class="grid-overlay"></div>
    </div>

    <!-- ===== LOGIN CARD ===== -->
    <main class="login-container">
        <div class="glass-card">

            <!-- Logo -->
            <div class="logo-area">
                <div class="logo-icon" aria-hidden="true">📋</div>
                <h1 class="app-name">TeamWork Report</h1>
                <p class="app-subtitle">ระบบรายงานผลการทำงาน</p>
            </div>

            <!-- Form -->
            <form class="login-form" id="loginForm" autocomplete="on" novalidate>
                <!-- Email -->
                <div class="form-group">
                    <label class="form-label" for="email">อีเมล</label>
                    <div class="input-wrapper">
                        <span class="input-icon">✉</span>
                        <input
                            type="email"
                            class="form-input"
                            id="email"
                            name="email"
                            placeholder="กรอกอีเมลของคุณ"
                            autocomplete="email"
                            required
                        >
                        <div class="input-glow"></div>
                    </div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label class="form-label" for="password">รหัสผ่าน</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input
                            type="password"
                            class="form-input"
                            id="password"
                            name="password"
                            placeholder="กรอกรหัสผ่าน"
                            autocomplete="current-password"
                            required
                        >
                        <button type="button" class="password-toggle" id="togglePassword" aria-label="แสดง/ซ่อนรหัสผ่าน">
                            👁
                        </button>
                        <div class="input-glow"></div>
                    </div>
                </div>

                <!-- Options row -->
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember">
                        <span>จดจำฉัน</span>
                    </label>
                    <a href="#" class="forgot-link">ลืมรหัสผ่าน?</a>
                </div>

                <!-- Login button -->
                <div class="btn-actions">
                    <button type="submit" class="btn-login" id="btnLogin">
                        เข้าสู่ระบบ
                    </button>
                </div>

                <!-- Divider -->
                <div class="divider">
                    <span>หรือ</span>
                </div>

                <!-- Google button -->
                <button type="button" class="btn-google" id="btnGoogle">
                    <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    เข้าสู่ระบบด้วย Google
                </button>
            </form>

            <!-- Register -->
            <div class="register-section">
                <p>ยังไม่มีบัญชี? <a href="#" class="register-link">ลงทะเบียน</a></p>
            </div>

        </div>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <p>© 2026 TeamWork Report — พัฒนาด้วย ❤️ สำหรับทีมของคุณ</p>
    </footer>

    <!-- ===== JAVASCRIPT ===== -->
    <script>
        // ===== PASSWORD TOGGLE =====
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            togglePassword.textContent = isPassword ? '🙈' : '👁';
        });

        // ===== RIPPLE EFFECT ON LOGIN BUTTON =====
        const btnLogin = document.getElementById('btnLogin');

        btnLogin.addEventListener('click', function (e) {
            const rect = this.getBoundingClientRect();
            const ripple = document.createElement('span');
            ripple.classList.add('ripple');
            const size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
            ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
            this.appendChild(ripple);
            ripple.addEventListener('animationend', () => ripple.remove());
        });

        // ===== FORM SUBMISSION =====
        const loginForm = document.getElementById('loginForm');

        loginForm.addEventListener('submit', function (e) {
            e.preventDefault();

            const email = document.getElementById('email');
            const password = document.getElementById('password');

            // Simple validation
            if (!email.value.trim() || !password.value.trim()) {
                // Shake animation on empty fields
                [email, password].forEach(input => {
                    if (!input.value.trim()) {
                        input.style.borderColor = 'rgba(239, 68, 68, 0.6)';
                        input.style.boxShadow = '0 0 0 3px rgba(239, 68, 68, 0.1)';
                        input.parentElement.style.animation = 'shake 0.4s ease';
                        setTimeout(() => {
                            input.style.borderColor = '';
                            input.style.boxShadow = '';
                            input.parentElement.style.animation = '';
                        }, 800);
                    }
                });
                return;
            }

            // Show loading state
            btnLogin.classList.add('loading');
            btnLogin.disabled = true;

            // Simulate authentication delay, then redirect
            setTimeout(() => {
                btnLogin.classList.remove('loading');
                btnLogin.classList.add('success');
                btnLogin.textContent = '✓ สำเร็จ';
                btnLogin.style.color = 'white';

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 600);
            }, 1500);
        });

        // ===== GOOGLE BUTTON =====
        document.getElementById('btnGoogle').addEventListener('click', function () {
            this.style.transform = 'scale(0.97)';
            setTimeout(() => {
                this.style.transform = '';
            }, 150);
        });

        // ===== ADD SHAKE KEYFRAME DYNAMICALLY =====
        const shakeKeyframe = document.createElement('style');
        shakeKeyframe.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                20% { transform: translateX(-6px); }
                40% { transform: translateX(6px); }
                60% { transform: translateX(-4px); }
                80% { transform: translateX(4px); }
            }
        `;
        document.head.appendChild(shakeKeyframe);

        // ===== PARALLAX ORBS ON MOUSE MOVE (desktop only) =====
        if (window.matchMedia('(min-width: 768px)').matches) {
            const orbs = document.querySelectorAll('.orb');
            let rafId = null;
            let mouseX = 0, mouseY = 0;

            document.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
                mouseY = (e.clientY / window.innerHeight - 0.5) * 2;

                if (!rafId) {
                    rafId = requestAnimationFrame(() => {
                        orbs.forEach((orb, i) => {
                            const speed = (i + 1) * 6;
                            const x = mouseX * speed;
                            const y = mouseY * speed;
                            orb.style.transform = `translate(${x}px, ${y}px)`;
                        });
                        rafId = null;
                    });
                }
            });
        }

        // ===== INPUT AUTOFILL STYLE FIX =====
        // Detect autofill and adjust styles
        const inputs = document.querySelectorAll('.form-input');
        inputs.forEach(input => {
            // Check for autofill after a short delay
            setTimeout(() => {
                try {
                    if (input.matches(':-webkit-autofill')) {
                        input.style.WebkitBoxShadow = '0 0 0 30px #0f1629 inset';
                        input.style.WebkitTextFillColor = '#f0f0f5';
                    }
                } catch (e) { /* ignore */ }
            }, 200);
        });
    </script>
    <script src="js/theme.js"></script>
</body>
</html>
